name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Frontend/**'

env:
  NODE_VERSION: '18'

jobs:
  # ===========================================================================
  # BUILD & TEST
  # ===========================================================================
  build-and-test:
    name: Build and Test (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: Frontend/banking-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Frontend/banking-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test -- --coverage --watchAll=false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          directory: ./Frontend/banking-app
          flags: frontend
          name: frontend-coverage

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: Frontend/banking-app/dist
          retention-days: 7

  # ===========================================================================
  # DOCKER BUILD (for push to main/develop)
  # ===========================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend Docker image
        run: |
          docker build -f Frontend/banking-app/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/frontend:latest \
            .

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/frontend:latest

  # ===========================================================================
  # LIGHTHOSE PERFORMANCE
  # ===========================================================================
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './Frontend/banking-app/lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true
