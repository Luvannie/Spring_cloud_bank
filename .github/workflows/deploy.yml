name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ===========================================================================
  # DEPLOY BACKEND
  # ===========================================================================
  deploy-backend:
    name: Deploy Backend Services
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Get Maven wrapper
        working-directory: Backend
        run: mvn wrapper:wrapper -Dmaven=3.9.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build all service images
      - name: Build auth-service
        run: |
          docker build -f Backend/auth-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/auth-service:${{ github.ref_name }} \
            Backend/

      - name: Build account-service
        run: |
          docker build -f Backend/account-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/account-service:${{ github.ref_name }} \
            Backend/

      - name: Build transaction-service
        run: |
          docker build -f Backend/transaction-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/transaction-service:${{ github.ref_name }} \
            Backend/

      - name: Build payment-service
        run: |
          docker build -f Backend/payment-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/payment-service:${{ github.ref_name }} \
            Backend/

      - name: Build notification-service
        run: |
          docker build -f Backend/notification-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/notification-service:${{ github.ref_name }} \
            Backend/

      - name: Build api-gateway
        run: |
          docker build -f Backend/api-gateway/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/api-gateway:${{ github.ref_name }} \
            Backend/

      # Push all images
      - name: Push all images
        run: |
          docker push ghcr.io/${{ github.repository }}/auth-service:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/account-service:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/transaction-service:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/payment-service:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/notification-service:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/api-gateway:${{ github.ref_name }}

      # Deploy using docker-compose (for simple deployment)
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/banking/deploy
            git pull origin main
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --build
            docker system prune -f

  # ===========================================================================
  # DEPLOY FRONTEND
  # ===========================================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend
        run: |
          docker build -f Frontend/banking-app/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }} \
            Frontend/banking-app/

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/banking/deploy
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
            docker tag ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }} \
              ghcr.io/${{ github.repository }}/frontend:latest
            docker-compose -f docker-compose.prod.yml up -d --force-recreate frontend
            docker system prune -f

  # ===========================================================================
  # HEALTH CHECK
  # ===========================================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    
    steps:
      - name: Check API Gateway health
        run: |
          for i in {1..10}; do
            if curl -f http://${{ secrets.DEPLOY_HOST }}:8080/actuator/health; then
              echo "API Gateway is healthy"
              exit 0
            fi
            echo "Waiting for API Gateway... attempt $i"
            sleep 10
          done
          echo "API Gateway health check failed"
          exit 1

      - name: Check Frontend
        run: |
          curl -f http://${{ secrets.DEPLOY_HOST }}:3000 || exit 1
          echo "Frontend is healthy"

  # ===========================================================================
  # NOTIFICATION
  # ===========================================================================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: health-check
    if: always()
    
    steps:
      - name: Notify Slack on failure
        if: needs.health-check.result == 'failure'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          payload: |
            {
              "text": "❌ Deployment FAILED: ${{ github.repository }}@${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Deployment Failed*\n• *Repository:* `${{ github.repository }}`\n• *Tag:* `${{ github.ref_name }}`\n• *Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack on success
        if: needs.health-check.result == 'success'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          payload: |
            {
              "text": "✅ Deployment SUCCESS: ${{ github.repository }}@${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Deployment Successful*\n• *Repository:* `${{ github.repository }}`\n• *Tag:* `${{ github.ref_name }}`\n• *Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
