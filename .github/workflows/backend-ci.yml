name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Backend/**'

env:
  JAVA_VERSION: '17'
  MVN_VERSION: '3.9.6'

jobs:
  # ===========================================================================
  # BUILD & TEST
  # ===========================================================================
  build-and-test:
    name: Build and Test (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: banking_system
          POSTGRES_USER: banking_user
          POSTGRES_PASSWORD: banking_secure_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        env:
          REDIS_PASSWORD: redis_secure_password
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a redis_secure_password ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Get Maven wrapper
        working-directory: Backend
        run: mvn wrapper:wrapper -Dmaven=3.9.6

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('Backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build all modules
        working-directory: Backend
        run: mvn clean install -DskipTests

      - name: Run tests
        working-directory: Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: banking_system
          DB_USERNAME: banking_user
          DB_PASSWORD: banking_secure_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: redis_secure_password
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: mvn test

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-test-results
          path: Backend/**/target/surefire-reports/*.xml

  # ===========================================================================
  # DOCKER BUILD (for push to main/develop)
  # ===========================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Get Maven wrapper
        working-directory: Backend
        run: mvn wrapper:wrapper -Dmaven=3.9.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build auth-service Docker image
        working-directory: Backend
        run: |
          docker build -f auth-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/auth-service:latest \
            .

      - name: Push auth-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/auth-service:latest

      - name: Build account-service Docker image
        working-directory: Backend
        run: |
          docker build -f account-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/account-service:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/account-service:latest \
            .

      - name: Push account-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/account-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/account-service:latest

      - name: Build transaction-service Docker image
        working-directory: Backend
        run: |
          docker build -f transaction-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/transaction-service:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/transaction-service:latest \
            .

      - name: Push transaction-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/transaction-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/transaction-service:latest

      - name: Build payment-service Docker image
        working-directory: Backend
        run: |
          docker build -f payment-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/payment-service:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/payment-service:latest \
            .

      - name: Push payment-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/payment-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/payment-service:latest

      - name: Build notification-service Docker image
        working-directory: Backend
        run: |
          docker build -f notification-service/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/notification-service:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/notification-service:latest \
            .

      - name: Push notification-service image
        run: |
          docker push ghcr.io/${{ github.repository }}/notification-service:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/notification-service:latest

      - name: Build api-gateway Docker image
        working-directory: Backend
        run: |
          docker build -f api-gateway/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/api-gateway:latest \
            .

      - name: Push api-gateway image
        run: |
          docker push ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/api-gateway:latest

      - name: Build frontend Docker image
        run: |
          docker build -f Frontend/banking-app/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} \
            --tag ghcr.io/${{ github.repository }}/frontend:latest \
            .

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/frontend:latest

  # ===========================================================================
  # SECURITY SCAN
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
